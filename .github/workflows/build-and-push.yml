name: Build and Push

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Which version to build
        type: choice
        default: all
        options:
          - all
          - php74
          - php84
          - php85
  push:
    branches: [master]
    paths:
      - 'Dockerfile-*'
      - 'errors.ini'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      php74: ${{ steps.filter.outputs.php74 }}
      php84: ${{ steps.filter.outputs.php84 }}
      php85: ${{ steps.filter.outputs.php85 }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            php74:
              - 'Dockerfile-7.4'
              - 'errors.ini'
            php84:
              - 'Dockerfile-8.4'
              - 'errors.ini'
            php85:
              - 'Dockerfile-8.5'
              - 'errors.ini'

  build-php74:
    needs: changes
    if: needs.changes.outputs.php74 == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.scope == 'all' || inputs.scope == 'php74'))
    uses: ./.github/workflows/docker-build.yml
    with:
      dockerfile: Dockerfile-7.4
      tags: latest7 latest7.4
      scope: php74
    secrets: inherit

  build-php84:
    needs: changes
    if: needs.changes.outputs.php84 == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.scope == 'all' || inputs.scope == 'php84'))
    uses: ./.github/workflows/docker-build.yml
    with:
      dockerfile: Dockerfile-8.4
      tags: latest8.4
      scope: php84
    secrets: inherit

  build-php85:
    needs: changes
    if: needs.changes.outputs.php85 == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.scope == 'all' || inputs.scope == 'php85'))
    uses: ./.github/workflows/docker-build.yml
    with:
      dockerfile: Dockerfile-8.5
      tags: latest latest8 latest8.5
      scope: php85
    secrets: inherit
