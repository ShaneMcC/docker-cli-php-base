name: Docker Build

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      tags:
        required: true
        type: string
      scope:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    concurrency: build-${{ inputs.scope }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: registry.shanemcc.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate tags
        id: tags
        run: |
          TAGS=""
          for tag in ${{ inputs.tags }}; do
            TAGS+="docker.io/shanemcc/docker-cli-php-base:${tag}"$'\n'
            TAGS+="registry.shanemcc.net/public/docker-cli-php-base:${tag}"$'\n'
          done
          {
            echo "tags<<EOF"
            echo -n "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v7.2.0
        with:
          push: true
          context: .
          file: ${{ inputs.dockerfile }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.scope }}
          provenance: false
